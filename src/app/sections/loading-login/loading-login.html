<main class="min-h-screen flex flex-col items-center justify-center relative px-6 bg-background font-body text-on-surface antialiased overflow-hidden">
  <!-- Background Editorial Element: Soft Tonal Shift -->
  <div class="absolute inset-0 z-0 pointer-events-none overflow-hidden">
    <div class="absolute -top-24 -left-24 w-96 h-96 bg-secondary-container/20 rounded-full blur-3xl"></div>
    <div class="absolute -bottom-24 -right-24 w-96 h-96 bg-primary-fixed/20 rounded-full blur-3xl"></div>
  </div>

  <!-- Content Container -->
  <div class="z-10 flex flex-col items-center text-center max-w-md w-full">
    <!-- Brand Identity Anchor -->
    <div class="mb-12 flex flex-col items-center gap-4">
      <div class="w-16 h-16 bg-primary rounded-xl flex items-center justify-center shadow-lg">
        <mat-icon class="text-on-primary text-4xl leading-none h-auto w-auto">inventory_2</mat-icon>
      </div>
      <h1 class="font-headline text-3xl font-extrabold tracking-tight text-primary">
        Korra
      </h1>
      <p class="font-headline text-sm font-semibold text-secondary tracking-widest uppercase">
        Simplifica tu cocina
      </p>
    </div>

    <!-- Loading State -->
    <div class="w-full space-y-8 bg-surface-container-lowest/60 backdrop-blur-md p-8 rounded-xl border border-outline-variant/10">
      <!-- Waste Meter Style Progress Bar -->
      <div class="space-y-3">
        <div class="flex justify-between items-end mb-1">
          <span class="text-sm font-medium text-on-surface-variant font-label">
            {{ statusMessage() }}
          </span>
          <span class="text-xs font-bold text-primary font-label">{{ progress() }}%</span>
        </div>
        <div class="h-3 w-full bg-surface-container-highest rounded-full overflow-hidden">
          <div
            class="h-full bg-gradient-to-r from-secondary to-secondary-fixed rounded-full transition-all duration-300 ease-out"
            [style.width.%]="progress()"
          ></div>
        </div>
      </div>
    </div>
  </div>
</main>
