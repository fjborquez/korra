<div class="max-w-7xl mx-auto py-10">
  <section class="mb-10">
    <div class="flex flex-col md:flex-row md:items-end justify-between gap-6">
      <div>
        <h2 class="text-4xl font-extrabold text-on-surface tracking-tight mb-2 font-headline">Recién surtido.</h2>
        <p class="text-on-surface-variant max-w-md">Tienes {{ products().length }} productos en {{ categories().length }} categorias. {{ immediatlyAttention().length }} productos requieren tu atención inmediata.</p>
      </div>
      <button class="bg-primary text-on-primary px-8 py-4 rounded-full font-bold flex items-center gap-2 hover:scale-105 active:scale-95 transition-transform shadow-lg shadow-primary/20">
        <mat-icon>add</mat-icon>
        Add New Item
      </button>
    </div>
  </section>

  <app-inventory-filters [status]="status()" [categories]="categories()" (filterByStatus)="filterByStatus($event)"></app-inventory-filters>

  <!-- Grid -->
  <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6">
    <app-smart-insight></app-smart-insight>

    @for (product of productsToShow(); track product.id) {
      <app-inventory-product [product]="product"></app-inventory-product>
    }
  </div>
</div>
