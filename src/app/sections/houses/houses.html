<div class="max-w-7xl mx-auto py-10">
  <div class="flex flex-col md:flex-row md:items-end justify-between gap-6 mb-12">
    <div>
      <h2 class="text-4xl font-extrabold text-on-surface tracking-tight mb-2 font-headline">Mis Casas</h2>
    </div>
    <button (click)="showAddModal.set(true)" class="inline-flex items-center gap-2 px-8 py-4 bg-primary text-on-primary rounded-full font-bold text-base shadow-lg shadow-primary/20 hover:shadow-xl hover:-translate-y-0.5 transition-all">
      <mat-icon>add</mat-icon>
      Añadir Casa
    </button>
  </div>

  <div class="grid grid-cols-1 lg:grid-cols-2 xl:grid-cols-3 gap-8">
    @for (house of houses(); track house.id) {
      <app-house-info [house]="house" [defaultHouse]="defaultHouse()" (refreshList)="refreshList()"></app-house-info>
    }
  </div>
  @if (showAddModal()) {
    <app-house-form (cancelled)="showAddModal.set(false)" (saved)="showAddModal.set(false)"></app-house-form>
  }
</div>
