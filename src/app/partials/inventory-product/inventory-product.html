<div class="bg-surface-container-lowest rounded-3xl p-0 overflow-hidden relative group hover:shadow-xl transition-all duration-300 border border-outline-variant/5">
  <!-- Status Bar -->
  <div
    class="absolute left-0 top-0 bottom-0 w-1.5 z-10"
    [class.bg-error]="isExpiringSoon(product)"
    [class.bg-secondary]="!isExpiringSoon(product)"
  ></div>

  <div class="aspect-[4/3] overflow-hidden relative">
    <img src="https://sublimac.com/wp-content/uploads/2017/11/default-placeholder.png" [alt]="product.catalog_description" class="w-full h-full object-cover group-hover:scale-110 transition-transform duration-500">
    <div class="absolute top-3 right-3">
      <span [style.background-color]="statusBgColor()" [style.color]="statusColor()" class="bg-error-container text-on-error-container px-3 py-1 rounded-full text-[10px] font-bold uppercase tracking-wider flex items-center gap-1 backdrop-blur-md">
        @if (currentStatus() === 'Expired') {
          <mat-icon class="text-xs h-auto w-auto">warning</mat-icon>
        }
        {{ currentStatus() }}
      </span>
    </div>
  </div>

  <div class="p-6">
    <div class="flex justify-between items-start mb-1">
      <h3 class="text-xl font-bold text-on-surface leading-tight font-headline">{{ product.catalog_description }}</h3>
      <span class="text-[10px] font-bold text-secondary bg-secondary-container/30 px-2 py-0.5 rounded uppercase tracking-wider">{{ product.category }}</span>
    </div>
    <div class="flex justify-between items-start mb-1">
      <h4 class="text-l font-bold text-on-surface leading-tight font-headline">{{ product.brand_name }}</h4>
    </div>
    <p class="text-on-surface-variant text-sm mb-4">Cantidad: {{ product.quantity }} {{ product.uom_abbreviation }}</p>

    <div class="flex items-center justify-between">
      <div class="flex items-center gap-2">
        <button (click)="consume()" class="w-8 h-8 rounded-full bg-surface-container-high flex items-center justify-center text-on-surface-variant hover:bg-primary hover:text-on-primary transition-colors">
          <mat-icon class="text-sm">remove</mat-icon>
        </button>
        <button (click)="remove(product)" class="w-8 h-8 rounded-full bg-surface-container-high flex items-center justify-center text-on-surface-variant hover:bg-error hover:text-on-error transition-colors">
          <mat-icon class="text-sm">delete</mat-icon>
        </button>
      </div>
      <a [routerLink]="['/product', product.id]" class="text-primary font-bold text-sm flex items-center gap-1 hover:underline">
        Detalles
        <mat-icon class="text-sm">chevron_right</mat-icon>
      </a>
    </div>
  </div>
</div>
