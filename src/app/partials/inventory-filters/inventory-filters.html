<!-- Filters -->
<div class="mb-10 flex flex-wrap items-center gap-3">
  <button (click)="selectStatus('all')" [ngClass]="{'bg-primary': 'all' === clickedStatus, 'text-on-primary': 'all' === clickedStatus, 'bg-surface-container-high': 'all' !== clickedStatus, 'text-on-surface-variant': 'all' !== clickedStatus, 'hover:bg-surface-container-highest': 'all' !== clickedStatus}" class="px-6 py-2.5 rounded-full text-sm font-semibold whitespace-nowrap">Mostrar todo</button>
  @for (aStatus of status; track aStatus) {
    <button (click)="selectStatus(aStatus)" [ngClass]="{'bg-primary': aStatus === clickedStatus, 'text-on-primary': aStatus === clickedStatus, 'bg-surface-container-high': aStatus !== clickedStatus, 'text-on-surface-variant': aStatus !== clickedStatus, 'hover:bg-surface-container-highest': aStatus !== clickedStatus}" class="px-6 py-2.5  transition-colors rounded-full text-sm font-semibold whitespace-nowrap">
      {{ getTranslatedStatus(aStatus) }}
    </button>
  }
  <div class="w-px h-6 bg-outline-variant/30 mx-2"></div>
   <div class="relative">
    <button
      (click)="toggleCategoryDropdown()"
      class="px-6 py-2.5 bg-white border-2 border-primary/20 text-primary rounded-full text-sm font-bold flex items-center gap-2 hover:border-primary transition-all shadow-sm"
    >
      <mat-icon class="text-lg">filter_list</mat-icon>
      {{ clickedCategory || 'Categoria' }}
      <mat-icon class="text-lg transition-transform" [class.rotate-180]="isCategoryDropdownOpen()">expand_more</mat-icon>
    </button>

    <!-- Dropdown Content -->
    @if (isCategoryDropdownOpen()) {
      <div
        id="category-dropdown"
        class="absolute top-full left-0 mt-3 w-72 bg-white rounded-2xl shadow-2xl border border-slate-100 z-50 overflow-hidden py-3"
      >
        <div class="px-5 py-2 mb-2">
          <p class="text-[10px] font-black uppercase tracking-widest text-slate-400">Filtrar por categoria</p>
        </div>
        <div class="space-y-1">
          @for (cat of categories; track cat) {
            <button
              (click)="selectCategory(cat)"
              class="w-full px-5 py-3 flex items-center justify-between hover:bg-slate-50 transition-all group"
            >
              <div class="flex items-center gap-4">
                <span class="text-sm font-bold text-on-surface group-hover:text-primary transition-colors">{{ cat }}</span>
              </div>
            </button>
          }
          <div class="border-t border-slate-100 mt-2 pt-2">
            <button
              (click)="selectCategory('')"
              class="w-full px-5 py-3 text-left text-sm font-bold text-slate-400 hover:text-primary transition-colors"
            >
              Limpiar
            </button>
          </div>
        </div>
      </div>
    }
  </div>
</div>
