<!-- Filters -->
<div  class="flex items-center gap-2 mb-8 overflow-x-auto pb-2 scrollbar-hide">
  <button (click)="selectStatus('all')" [ngClass]="{'bg-primary': 'all' === clicked, 'text-on-primary': 'all' === clicked, 'bg-surface-container-high': 'all' !== clicked, 'text-on-surface-variant': 'all' !== clicked, 'hover:bg-surface-container-highest': 'all' !== clicked}" class="px-6 py-2.5 rounded-full text-sm font-semibold whitespace-nowrap">All Items</button>
  @for (aStatus of status; track aStatus) {
    <button (click)="selectStatus(aStatus)" [ngClass]="{'bg-primary': aStatus === clicked, 'text-on-primary': aStatus === clicked, 'bg-surface-container-high': aStatus !== clicked, 'text-on-surface-variant': aStatus !== clicked, 'hover:bg-surface-container-highest': aStatus !== clicked}" class="px-6 py-2.5  transition-colors rounded-full text-sm font-semibold whitespace-nowrap">
      {{ aStatus }}
    </button>
  }
  <div class="w-px h-6 bg-outline-variant/30 mx-2"></div>
  <button class="px-6 py-2.5 bg-surface-container-low border border-outline-variant/10 text-on-surface-variant hover:bg-white transition-colors rounded-full text-sm font-semibold flex items-center gap-2 whitespace-nowrap">
    <mat-icon class="text-sm">filter_list</mat-icon>
    Categorias
  </button>
</div>
