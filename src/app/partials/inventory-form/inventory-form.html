<div class="fixed inset-0 z-[100] flex items-center justify-center p-4">
  <!-- Backdrop -->
  <div class="absolute inset-0 bg-surface-dim/60 glass-effect backdrop-blur-md" (click)="handleCancel()" (keydown.escape)="handleCancel()" role="button" tabindex="0" aria-label="Cerrar modal"></div>

  <!-- Modal Content -->
  <div class="relative bg-surface-container-lowest w-full max-w-lg rounded-[2rem] shadow-2xl overflow-hidden border border-white/20 animate-in fade-in zoom-in duration-300">
    <!-- Modal Header -->
    <div class="px-8 pt-10 pb-6">
      <div class="flex items-center gap-3 mb-2">
        <div class="w-10 h-10 bg-primary/10 rounded-xl flex items-center justify-center">
          <mat-icon class="text-primary">inventory</mat-icon>
        </div>
        @if (inventoryProduct) {
          <div>
            <h3 class="text-2xl font-headline font-extrabold text-on-surface leading-tight">Edita un producto</h3>
            <p class="text-sm text-on-surface-variant">Edita un producto existente en tu inventario</p>
          </div>
        }
        @else {
          <div>
            <h3 class="text-2xl font-headline font-extrabold text-on-surface leading-tight">Nuevo producto</h3>
            <p class="text-sm text-on-surface-variant">Agrega un nuevo producto a tu inventario</p>
          </div>
        }
      </div>
    </div>

    <!-- Modal Form -->
    <form [formGroup]="inventoryForm" (ngSubmit)="onSubmit()" class="px-8 pb-10 space-y-6">
      <!-- Field: Nombre -->
      <div class="space-y-2">
        <label for="product" class="text-xs font-bold uppercase tracking-wider text-primary ml-1">Producto</label>
        <input
          id="product"
          formControlName="product"
          class="w-full bg-surface-container-high border-none rounded-xl px-4 py-3.5 focus:ring-2 focus:ring-primary/20 text-on-surface placeholder:text-outline transition-all"
          placeholder="Ej: Queso Laminado Soprole"
          type="text"
          [matAutocomplete]="productCatalogAutocomplete"
        />
        <mat-autocomplete #productCatalogAutocomplete="matAutocomplete" [displayWith]="displayProductCatalog">
          @for (product of productsCatalog | async; track product) {
            <mat-option [value]="product">{{ displayProductCatalog(product) }}</mat-option>
          }
        </mat-autocomplete>
      </div>

      <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
        <div class="flex flex-col justify-end">
          <label for="quantity" class="text-xs font-bold uppercase tracking-wider text-primary ml-1">Cantidad</label>
          <input
            id="quantity"
            formControlName="quantity"
            class="w-full bg-surface-container-high border-none rounded-xl px-4 py-3.5 focus:ring-2 focus:ring-primary/20 text-on-surface placeholder:text-outline transition-all"
            placeholder="Ej: 10"
            type="number"
          />
        </div>
        <div class="space-y-2">
          <label for="unit_of_measurement" class="text-xs font-bold uppercase tracking-wider text-primary ml-1">Unidad de medida</label>
          <div class="relative">
            <select
              id="unit_of_measurement"
              formControlName="unit_of_measurement"
              class="w-full appearance-none bg-surface-container-high border-none rounded-xl px-4 py-3.5 focus:ring-2 focus:ring-primary/20 text-on-surface transition-all pr-10"
            >
              @for (unit of unitsOfMeasurement(); track unit) {
                <option [ngValue]="unit">{{ unit.description }}</option>
              }
            </select>
            <mat-icon class="absolute right-3 top-3.5 text-on-surface-variant pointer-events-none">expand_more</mat-icon>
          </div>
        </div>
      </div>
      <div class="flex flex-col justify-end">
        <label for="purchase_date" class="text-xs font-bold uppercase tracking-wider text-primary ml-1">Fecha de compra</label>
        <input
          id="purchase_date"
          formControlName="purchase_date"
          class="w-full bg-surface-container-high border-none rounded-xl px-4 py-3.5 focus:ring-2 focus:ring-primary/20 text-on-surface placeholder:text-outline transition-all"
          placeholder="Ej: 04-04-2026"
          type="date"
        />
      </div>
      <div class="flex flex-col justify-end">
        <label for="expiration_date-name" class="text-xs font-bold uppercase tracking-wider text-primary ml-1">Fecha de caducidad</label>
        <input
          id="expiration_date"
          formControlName="expiration_date"
          class="w-full bg-surface-container-high border-none rounded-xl px-4 py-3.5 focus:ring-2 focus:ring-primary/20 text-on-surface placeholder:text-outline transition-all"
          placeholder="Ej: 04-04-2027"
          type="date"
        />
      </div>

      <div class="flex gap-4 pt-4">
        <button
          type="button"
          (click)="handleCancel()"
          class="flex-1 px-6 py-4 rounded-full font-bold text-on-surface-variant hover:bg-surface-container-high transition-all text-center"
        >
          Cancelar
        </button>
        <button
          type="submit"
          [disabled]="inventoryForm.invalid"
          class="flex-1 px-6 py-4 rounded-full font-bold bg-primary text-on-primary shadow-lg shadow-primary/20 hover:scale-[1.02] active:scale-[0.98] transition-all text-center disabled:opacity-50 disabled:scale-100"
        >
          Guardar Producto
        </button>
      </div>
    </form>
  </div>
</div>
